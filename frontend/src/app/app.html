<main class="page-shell">
  <header class="page-header">
    <p class="eyebrow">CSV Aggregator</p>
    <h1>CSV 一覧</h1>
  </header>

  @if (isLoading()) {
  <p class="status">読み込み中...</p>
  } @else if (errorMessage()) {
  <p class="status error">{{ errorMessage() }}</p>
  } @else {
  <section class="table-wrap" aria-label="CSV 一覧">
    <table>
      <thead>
        <tr>
          <th scope="col">CSV 名</th>
          <th scope="col">テーブル名</th>
          <th scope="col">登録日時</th>
        </tr>
      </thead>
      <tbody>
        @for (item of items(); track item.id) {
        <tr>
          <td>{{ item.name }}</td>
          <td>
            <code>{{ item.tableName }}</code>
          </td>
          <td>{{ item.createdAt }}</td>
        </tr>
        }
      </tbody>
    </table>
  </section>
  }
</main>
