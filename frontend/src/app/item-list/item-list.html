<header class="page-header">
  <h1>CSV 一覧</h1>
  <button class="btn-primary" routerLink="/register">新規登録</button>
</header>

@if (isLoading()) {
<p class="status">読み込み中...</p>
} @else if (errorMessage()) {
<p class="status error">{{ errorMessage() }}</p>
} @else {
<section class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>CSV 名</th>
        <th>テーブル名</th>
        <th>登録日時</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      @for (item of items(); track item.id) {
      <tr>
        <td>{{ item.name }}</td>
        <td><code>{{ item.tableName }}</code></td>
        <td>{{ item.createdAt }}</td>
        <td>
          <button class="btn-danger" (click)="deleteItem(item.id)">削除</button>
        </td>
      </tr>
      }
    </tbody>
  </table>
</section>
}
