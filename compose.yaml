services:
  frontend:
    build:
      context: ./frontend
    command: npm start -- --host 0.0.0.0 --proxy-config proxy.conf.json
    ports:
      - "127.0.0.1:4200:4200"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DB_HOST: db
      DB_NAME: bootcamp_app
      DB_USER: bootcamp_app
      DB_PASSWORD: bootcamp_app
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: bootcamp_app
      POSTGRES_USER: bootcamp_app
      POSTGRES_PASSWORD: bootcamp_app
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bootcamp_app -d bootcamp_app" ]
      interval: 5s
      timeout: 5s
      retries: 5
